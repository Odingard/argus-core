# ARGUS Arena — 12 Intentionally Vulnerable AI Agent Targets
#
# Usage:
#   cd arena/
#   docker compose up -d            # start all 12 targets
#   docker compose up -d arena-01   # start just one
#
# Then point ARGUS at them:
#   ARGUS_WEB_ALLOW_PRIVATE=1 argus scan arena --agent-endpoint http://localhost:9001/chat
#
# WARNING: These are intentionally vulnerable. DO NOT expose to the internet.

services:
  arena-01-prompt-leak:
    build:
      context: ..
      dockerfile: arena/Dockerfile
    ports:
      - "9001:9001"
    command: ["python", "-c", "from arena.scenarios.arena_01_prompt_leak import PromptLeakScenario; PromptLeakScenario().run()"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

