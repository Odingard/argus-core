[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "argus-redteam"
version = "0.4.1"
description = "Deprecated — install argus-core instead. This release is a compatibility shim that pulls in argus-core so existing requirements files keep working."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "argus-core>=0.5.0,<1.0",
]
authors = [
    { name = "ARGUS Defense", email = "security@sixsenseenterprise.com" },
]
keywords = ["deprecated", "argus", "redteam", "ai", "mcp", "agent", "security"]
classifiers = [
    "Development Status :: 7 - Inactive",
    "License :: OSI Approved :: MIT License",
    "Topic :: Security",
]

[project.urls]
Homepage       = "https://github.com/Odingard/argus-core"
Documentation  = "https://github.com/Odingard/argus-core#readme"
Source         = "https://github.com/Odingard/argus-core"
Replacement    = "https://pypi.org/project/argus-core/"

[tool.setuptools]
# Shim has no Python code of its own — the argus.* namespace ships via
# the argus-core dependency.
packages = []
