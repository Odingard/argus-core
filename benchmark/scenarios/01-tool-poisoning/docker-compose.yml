version: "3.8"
services:
  mcp-server:
    build: .
    command: python3 mcp_server.py
    ports:
      - "8001:8001"
    environment:
      - MCP_PORT=8001
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  target-agent:
    build: .
    command: python3 target_agent.py
    ports:
      - "8002:8002"
    environment:
      - MCP_URL=http://mcp-server:8001
      - AGENT_PORT=8002
    depends_on:
      mcp-server:
        condition: service_healthy
