[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "argus-redteam"
version = "0.1.5"
description = "ARGUS — Autonomous AI Red Team Platform. 13 specialized agents attack AI systems, MCP servers, and multi-agent workflows in parallel."
requires-python = ">=3.11"
license = {text = "BSL-1.1"}
readme = "README.md"
authors = [
    {name = "Odingard Security"},
]
keywords = [
    "ai-security",
    "red-team",
    "mcp",
    "ai-agents",
    "penetration-testing",
    "llm-security",
    "prompt-injection",
    "autonomous-security",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Topic :: Security",
    "Topic :: Software Development :: Testing",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "anthropic>=0.93.0,<1.0",
    "openai>=2.31.0,<3.0",
    "httpx>=0.28.0,<1.0",
    "pydantic>=2.12.0,<3.0",
    "rich>=14.0.0,<15.0",
    "click>=8.1.0,<9.0",
    "pyyaml>=6.0.0,<7.0",
    "fastapi>=0.115.0,<1.0",
    "python-multipart>=0.0.22",
    "uvicorn[standard]>=0.34.0,<1.0",
    "sse-starlette>=2.1.0,<3.0",
    "verdict-weight>=1.0.0,<2.0",
    "sqlalchemy>=2.0.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0,<10.0",
    "pytest-asyncio>=1.3.0,<2.0",
    "ruff>=0.15.0,<1.0",
    "pip-audit>=2.7.0",
]

[project.urls]
Homepage = "https://github.com/Odingard/Argus"
Repository = "https://github.com/Odingard/Argus"
Issues = "https://github.com/Odingard/Argus/issues"

[project.scripts]
argus = "argus.cli:main"

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "benchmark/scenarios",  # deliberately-vulnerable third-party test target fixtures
    "benchmark/official",   # community submission sidecar (third-party reference scoring)
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "S",    # bandit security checks
    "B",    # bugbear
    "UP",   # pyupgrade
]
ignore = [
    "S101",  # assert used in tests
    "S105",  # false positive on enum values that look like passwords
    "S108",  # /tmp usage is intentional in sandbox and test code
    "S603",  # subprocess call is allowlisted in MCP client
    "UP042", # keep str+Enum for Python 3.11 compat (StrEnum is 3.11+)
    "B017",  # pytest.raises(Exception) used intentionally in security tests
]

[tool.ruff.lint.per-file-ignores]
"src/argus/corpus/manager.py" = ["E501"]  # attack patterns are long strings by nature
"src/argus/agents/*.py" = ["E501"]  # attack payloads are long strings by nature
"src/argus/web/server.py" = ["B008"]  # Depends() in defaults is FastAPI's standard pattern
"src/argus/web/api_routes.py" = ["B008"]  # Depends() in defaults is FastAPI's standard pattern
"src/argus/web/auth.py" = ["B008"]  # Depends() in defaults is FastAPI's standard pattern
"src/argus/reporting/html_report.py" = ["E501"]  # inline CSS in HTML template strings
"src/argus/prometheus/modules_lib/*.py" = ["E501"]  # attack module payloads are long strings

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
