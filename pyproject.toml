[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "argus"
version = "0.1.0"
description = "ARGUS — Autonomous AI Red Team Platform"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.93.0,<1.0",
    "openai>=2.31.0,<3.0",
    "httpx>=0.28.0,<1.0",
    "pydantic>=2.12.0,<3.0",
    "rich>=14.0.0,<15.0",
    "click>=8.1.0,<9.0",
    "pyyaml>=6.0.0,<7.0",
    "fastapi>=0.115.0,<1.0",
    "uvicorn[standard]>=0.34.0,<1.0",
    "sse-starlette>=2.1.0,<3.0",
    "verdict-weight>=1.0.0,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0,<10.0",
    "pytest-asyncio>=1.3.0,<2.0",
    "ruff>=0.15.0,<1.0",
    "pip-audit>=2.7.0",
]

[project.scripts]
argus = "argus.cli:main"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "S",    # bandit security checks
    "B",    # bugbear
    "UP",   # pyupgrade
]
ignore = [
    "S101",  # assert used in tests
    "S105",  # false positive on enum values that look like passwords
    "S108",  # /tmp usage is intentional in sandbox and test code
    "S603",  # subprocess call is allowlisted in MCP client
    "UP042", # keep str+Enum for Python 3.11 compat (StrEnum is 3.11+)
    "B017",  # pytest.raises(Exception) used intentionally in security tests
]

[tool.ruff.lint.per-file-ignores]
"src/argus/corpus/manager.py" = ["E501"]  # attack patterns are long strings by nature
"src/argus/agents/*.py" = ["E501"]  # attack payloads are long strings by nature

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
