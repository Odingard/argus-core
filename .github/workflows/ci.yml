name: ARGUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  test:
    name: Contract + suite tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio pytest-timeout
      - name: Run suite (offline)
        # Contract tests enforce the no-fabrication / MAAC-coverage /
        # real-library PoC invariants. All tests run offline —
        # argus-targets/ (third-party repos) is excluded.
        run: pytest tests/ -q --timeout=120 --ignore=argus-targets --ignore=tests/test_real_mcp.py
        env:
          ANTHROPIC_API_KEY: "dummy-key-for-offline-contract-tests"
          ARGUS_OFFLINE: "1"

  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit high-severity scan
        # Medium + Low findings are allowed (mostly asserts in tests,
        # binds to 127.0.0.1 in dev tooling). CI fails on any High.
        run: bandit -r src/argus -q -lll

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install semgrep
        run: pip install semgrep
      - name: Semgrep auto-config
        # --error makes CI fail on any finding. Every flagged line in
        # the repo has a justified # nosemgrep: ... suppression.
        # p/python + p/secrets are stable public rulesets that don't
        # require SEMGREP_APP_TOKEN (--config=auto requires auth).
        run: semgrep --config=p/python --config=p/secrets --error --quiet src/argus/

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Upgrade pip (self-audit)
        run: pip install --upgrade pip
      - name: Install project
        run: pip install -e .
      - name: Audit
        # --skip-editable silences the cosmetic "argus-core (editable)
        # not on PyPI" warning. CVE-2026-3219 affects pip itself with
        # no upstream fix released; ignored pending patch availability.
        run: pip-audit --progress-spinner off --skip-editable --ignore-vuln CVE-2026-3219

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Audit against baseline
        # The baseline contains every labrat fake credential and
        # classifier regex pattern — real secrets would show up as
        # "new" findings and fail CI.
        run: |
          detect-secrets scan \
            --exclude-files '\.venv/|legacy/|\.claude/|argus-targets/' \
            --baseline .secrets.baseline

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, bandit, semgrep]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-dist
          path: dist/
